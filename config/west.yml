manifest:
  defaults:
    # Pinned to a specific ZMK commit (no release tag has Studio yet; main floats).
    # ff09f2d0 = ZMK main @ 2026-06-07 — the tree this config was verified against.
    revision: ff09f2d0c9f13a868c8f71d71d9348ade438e4b6
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
  self:
    path: config
