description: NXP PCA95XX I2C I/O expander

compatible: "nxp,pca95xx"

include:
  - name: base.yaml
  - name: gpio-controller.yaml

properties:
  reg:
    required: true
  interrupt-gpios:
    type: phandle-array
    required: false
    description: Interrupt GPIO pin connected to the INT line

gpio-cells:
  - pin
  - flags
